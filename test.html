<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nala App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="brand">
        <h1>NALA APP</h1>
        <p class="tagline">Create your account</p>
      </header>

      <div class="card">
        <h2>Sign Up</h2>

        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Your full name" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create a password" />
        </div>

        <div class="form-group">
          <label for="age">Age</label>
          <input id="age" type="number" placeholder="Your age" min="1" max="120" />
        </div>

        <div class="form-group">
          <label class="group-label">Gender</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="gender" value="male" />
              <span>Male</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="female" />
              <span>Female</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="other" />
              <span>Other</span>
            </label>
          </div>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-option">
            <input type="checkbox" id="terms" />
            <span>I agree to the Terms &amp; Conditions</span>
          </label>
        </div>

        <div class="actions">
          <button class="btn btn-secondary" onclick="onclickkMe()">Say Hello</button>
          <button class="btn btn-primary" onclick="onclickSign()">Create Account</button>
        </div>

        <p class="login-link">Already have an account? <a href="#">Log in here</a></p>
      </div>
    </div>

    <script src="JS.js"></script>
  </body>
</html>
